# ---------------------------------------------------------------------------
# Apex Scanner — TLS edge reverse proxy (apexscanner.6dcorp.internal)
#
# Single HTTPS origin in front of the stack:
#   /api/, /reports/, /sboms/, /docs, /redoc, /openapi.json -> api:8000
#   everything else (the React SPA)                          -> dashboard:8080
#   :80                                                       -> 301 to https
#
# TLS cert/key are rendered + auto-renewed on the host by Vault Agent and
# bind-mounted read-only at /etc/nginx/certs (see app/edge/README.md).
# ---------------------------------------------------------------------------
worker_processes auto;
events { worker_connections 1024; }

http {
    include       /etc/nginx/mime.types;
    default_type  application/octet-stream;
    sendfile      on;
    keepalive_timeout 65;
    server_tokens off;
    client_max_body_size 64m;          # SBOM/IaC uploads

    gzip on;
    gzip_types text/plain text/css application/json application/javascript application/xml;

    # Upstreams resolve via the compose network (service names).
    upstream apex_dashboard { server dashboard:8080; }
    upstream apex_api       { server api:8000; }

    # Shared proxy headers for the API/file routes.
    proxy_http_version 1.1;

    # --- HTTP :80 -> redirect to HTTPS ---
    server {
        listen 80;
        server_name apexscanner.6dcorp.internal;
        return 301 https://$host$request_uri;
    }

    # --- HTTPS :443 ---
    server {
        listen 443 ssl;
        http2 on;
        server_name apexscanner.6dcorp.internal;

        # Single Vault-issued PEM holding cert chain + key. Both directives read
        # the same file so the pair is always from ONE issuance (never mismatched
        # — which is what splitting it across two Agent templates would cause).
        ssl_certificate     /etc/nginx/certs/combined.pem;
        ssl_certificate_key /etc/nginx/certs/combined.pem;
        ssl_protocols       TLSv1.2 TLSv1.3;
        ssl_ciphers         HIGH:!aNULL:!MD5;
        ssl_prefer_server_ciphers on;
        ssl_session_cache   shared:SSL:10m;
        ssl_session_timeout 1d;

        # Security headers (HSTS only valid because we're https-only).
        add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
        add_header X-Content-Type-Options    "nosniff" always;
        add_header X-Frame-Options           "SAMEORIGIN" always;
        add_header Referrer-Policy           "strict-origin-when-cross-origin" always;

        # ---- App health (FastAPI JSON, used by the dashboard) ----
        location = /health {
            proxy_pass http://apex_api;
            proxy_set_header Host $host;
            proxy_set_header X-Forwarded-Proto https;
        }

        # ---- API ----
        location /api/ {
            proxy_pass http://apex_api;
            proxy_set_header Host              $host;
            proxy_set_header X-Real-IP         $remote_addr;
            proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto https;
            proxy_read_timeout 600s;          # long-running scans
            proxy_send_timeout 600s;
        }

        # ---- Report / SBOM static files (served by the API) ----
        location /reports/ {
            proxy_pass http://apex_api;
            proxy_set_header Host $host;
            proxy_set_header X-Forwarded-Proto https;
        }
        location /sboms/ {
            proxy_pass http://apex_api;
            proxy_set_header Host $host;
            proxy_set_header X-Forwarded-Proto https;
        }

        # ---- API docs (optional — remove these 3 to hide docs publicly) ----
        location = /openapi.json { proxy_pass http://apex_api; proxy_set_header Host $host; }
        location /docs           { proxy_pass http://apex_api; proxy_set_header Host $host; }
        location /redoc          { proxy_pass http://apex_api; proxy_set_header Host $host; }

        # ---- React SPA (everything else) ----
        location / {
            proxy_pass http://apex_dashboard;
            proxy_set_header Host              $host;
            proxy_set_header X-Forwarded-Proto https;
        }
    }
}
