version: "3.8"

# Shared environment variables for all app services
x-common-env: &common-env
  TZ: ${TZ:-UTC}
  REDIS_URL: redis://redis:6379/0
  REDIS_PASSWORD: ${REDIS_PASSWORD:?REDIS_PASSWORD is required}
  REDIS_TLS_ENABLED: ${REDIS_TLS_ENABLED:-false}
  SERVER_HOST: ${SERVER_HOST:?SERVER_HOST is required}
  SCAN_TIMEOUT: ${SCAN_TIMEOUT:-900}
  SCAN_RESULT_TTL: ${SCAN_RESULT_TTL:-2592000}
  LOG_FORMAT: ${LOG_FORMAT:-json}
  LOG_LEVEL: ${LOG_LEVEL:-INFO}

x-auth-env: &auth-env
  ADMIN_USERNAME: ${ADMIN_USERNAME:?ADMIN_USERNAME is required}
  ADMIN_PASSWORD_HASH: ${ADMIN_PASSWORD_HASH:?ADMIN_PASSWORD_HASH is required - generate with bcrypt}
  JWT_SECRET_KEY: ${JWT_SECRET_KEY:?JWT_SECRET_KEY is required}
  JWT_EXPIRATION_HOURS: ${JWT_EXPIRATION_HOURS:-24}
  CORS_ORIGINS: ${CORS_ORIGINS:-}
  API_KEY_ENABLED: ${API_KEY_ENABLED:-true}
  LOGIN_MAX_ATTEMPTS: ${LOGIN_MAX_ATTEMPTS:-5}
  LOGIN_LOCKOUT_SECONDS: ${LOGIN_LOCKOUT_SECONDS:-900}
  USER_USERNAME: ${USER_USERNAME:-}
  USER_PASSWORD_HASH: ${USER_PASSWORD_HASH:-}
  COOKIE_SECURE: ${COOKIE_SECURE:-false}

services:
  api:
    build:
      context: .
      dockerfile: Dockerfile.api
    container_name: fastapi_scanner
    ports:
      - "${SCANNER_PORT:-7070}:8000"
    depends_on:
      redis:
        condition: service_healthy
    environment:
      <<: [*common-env, *auth-env]
      ENABLE_METRICS: "true"
    volumes:
      - /opt/scanner-reports:/var/www/html/reports
      - /opt/scanner-sboms:/var/www/html/sboms
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/health', timeout=5)"]
      interval: 30s
      timeout: 10s
      retries: 3
    deploy:
      resources:
        limits:
          cpus: '2'
          memory: 2G
        reservations:
          cpus: '0.5'
          memory: 512M

  # Primary worker for high-priority scans (single image scans)
  # Workers do NOT need Docker socket access — scanners (Grype, Trivy, Syft)
  # pull images directly from registries using their own clients.
  worker-high:
    build:
      context: .
      dockerfile: Dockerfile.worker
    command: >
      celery -A app.tasks.celery worker
      --loglevel=info
      --concurrency=${WORKER_HIGH_CONCURRENCY:-8}
      --queues=high_priority,default
      --hostname=worker-high@%h
      --max-tasks-per-child=50
    depends_on:
      redis:
        condition: service_healthy
    environment:
      <<: *common-env
      WORKER_TYPE: high_priority
    volumes:
      - /opt/scanner-reports:/var/www/html/reports
      - /opt/scanner-sboms:/var/www/html/sboms
      - ${DOCKER_CONFIG_PATH:-./scripts/empty-docker-config.json}:/home/scanner/.docker/config.json:ro
    restart: unless-stopped
    deploy:
      resources:
        limits:
          cpus: '4'
          memory: 4G
        reservations:
          cpus: '1'
          memory: 1G

  # Batch workers for batch/scheduled scans (can be scaled)
  worker-batch:
    build:
      context: .
      dockerfile: Dockerfile.worker
    command: >
      celery -A app.tasks.celery worker
      --loglevel=info
      --concurrency=${WORKER_BATCH_CONCURRENCY:-12}
      --queues=batch,low_priority,default
      --hostname=worker-batch@%h
      --max-tasks-per-child=100
    depends_on:
      redis:
        condition: service_healthy
    environment:
      <<: *common-env
      WORKER_TYPE: batch
    volumes:
      - /opt/scanner-reports:/var/www/html/reports
      - /opt/scanner-sboms:/var/www/html/sboms
      - ${DOCKER_CONFIG_PATH:-./scripts/empty-docker-config.json}:/home/scanner/.docker/config.json:ro
    restart: unless-stopped
    deploy:
      mode: replicated
      replicas: ${BATCH_WORKER_REPLICAS:-2}
      resources:
        limits:
          cpus: '4'
          memory: 4G
        reservations:
          cpus: '1'
          memory: 1G

  # Dedicated worker for system tasks (DB updates, status checks)
  worker-system:
    build:
      context: .
      dockerfile: Dockerfile.worker
    command: >
      celery -A app.tasks.celery worker
      --loglevel=info
      --concurrency=4
      --queues=system
      --hostname=worker-system@%h
      --max-tasks-per-child=200
    depends_on:
      redis:
        condition: service_healthy
    environment:
      <<: *common-env
      WORKER_TYPE: system
    volumes:
      - /opt/scanner-reports:/var/www/html/reports
      - /opt/scanner-sboms:/var/www/html/sboms
    restart: unless-stopped
    deploy:
      resources:
        limits:
          cpus: '1'
          memory: 1G
        reservations:
          cpus: '0.25'
          memory: 256M

  scheduler:
    build:
      context: .
      dockerfile: Dockerfile.worker
    container_name: celery_beat
    command: ["celery", "-A", "app.tasks.celery", "beat", "--loglevel=info", "--schedule=/tmp/celerybeat-schedule"]
    depends_on:
      redis:
        condition: service_healthy
      worker-high:
        condition: service_started
    environment:
      <<: *common-env
    restart: unless-stopped

  # Docker socket proxy — restricts Docker API access to read-only container listing.
  # Only the autoscaler needs Docker access (to count worker containers).
  docker-proxy:
    image: tecnativa/docker-socket-proxy:latest
    container_name: docker_socket_proxy
    environment:
      CONTAINERS: 1
      SERVICES: 0
      TASKS: 0
      NETWORKS: 0
      VOLUMES: 0
      IMAGES: 0
      EXEC: 0
      POST: 0
      BUILD: 0
      COMMIT: 0
      SWARM: 0
      NODES: 0
      SECRETS: 0
      CONFIGS: 0
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro
    restart: unless-stopped
    deploy:
      resources:
        limits:
          cpus: '0.25'
          memory: 128M

  # Auto-scaler service - monitors queue and scales workers
  # Uses Docker socket proxy for restricted read-only container listing
  autoscaler:
    build:
      context: .
      dockerfile: Dockerfile.worker
    container_name: worker_autoscaler
    command: ["python", "-m", "app.autoscaler"]
    depends_on:
      redis:
        condition: service_healthy
      docker-proxy:
        condition: service_started
    environment:
      <<: *common-env
      DOCKER_HOST: tcp://docker-proxy:2375
      MIN_WORKERS: ${MIN_WORKERS:-2}
      MAX_WORKERS: ${MAX_WORKERS:-10}
      SCALE_UP_THRESHOLD: ${SCALE_UP_THRESHOLD:-10}
      SCALE_DOWN_THRESHOLD: ${SCALE_DOWN_THRESHOLD:-2}
      CHECK_INTERVAL: ${AUTOSCALE_CHECK_INTERVAL:-30}
    restart: unless-stopped
    deploy:
      resources:
        limits:
          cpus: '0.5'
          memory: 256M

  # Flower - Celery monitoring dashboard
  flower:
    build:
      context: .
      dockerfile: Dockerfile.worker
    container_name: celery_flower
    command: >
      celery -A app.tasks.celery flower
      --port=5555
      --broker=redis://redis:6379/0
      --basic_auth=${FLOWER_USER:?FLOWER_USER is required}:${FLOWER_PASSWORD:?FLOWER_PASSWORD is required}
    ports:
      - "${FLOWER_PORT:-5555}:5555"
    depends_on:
      redis:
        condition: service_healthy
    environment:
      <<: *common-env
    restart: unless-stopped
    deploy:
      resources:
        limits:
          cpus: '0.5'
          memory: 512M

  redis:
    image: "redis:7-alpine"
    container_name: redis_cache
    command: >
      redis-server
      --requirepass ${REDIS_PASSWORD:?REDIS_PASSWORD is required}
      --appendonly yes
      --appendfsync everysec
      --save 900 1
      --save 300 10
      --save 60 100
      --maxmemory ${REDIS_MAX_MEMORY:-2gb}
      --maxmemory-policy allkeys-lru
      --tcp-keepalive 300
      --timeout 0
      --tcp-backlog 511
      --maxclients 10000
      --stop-writes-on-bgsave-error no
    volumes:
      - redis-data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD}", "ping"]
      interval: 10s
      timeout: 3s
      retries: 3
    restart: unless-stopped
    deploy:
      resources:
        limits:
          cpus: '2'
          memory: 2.5G
        reservations:
          cpus: '0.5'
          memory: 512M

  dashboard:
    build:
      context: ../dashboard
      dockerfile: Dockerfile
    container_name: scanner_dashboard
    ports:
      - "${DASHBOARD_PORT:-3001}:8080"
    depends_on:
      - api
    environment:
      - TZ=${TZ:-UTC}
      - REACT_APP_API_URL=${DASHBOARD_API_URL:-http://localhost:7070}
    restart: unless-stopped

networks:
  default:
    driver: bridge

volumes:
  redis-data:
    driver: local
