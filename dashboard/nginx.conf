# Gzip compression
gzip on;
gzip_types text/plain text/css application/json application/javascript text/xml application/xml;

# Handle React Router. index.html must NOT be cached, or browsers keep an old
# copy that points at a deleted JS bundle after a deploy (blank page). The
# hashed /static/ assets below are still cached forever.
location / {
    try_files $uri $uri/ /index.html;
    add_header Cache-Control "no-cache, no-store, must-revalidate";
    add_header Pragma "no-cache";
}

# Cache static assets
location /static/ {
    expires 1y;
    add_header Cache-Control "public, immutable";
}

# Health check
location /health {
    access_log off;
    return 200 "healthy\n";
    add_header Content-Type text/plain;
}
